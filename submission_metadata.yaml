# AI tools declaration (transparency only — honest declaration is NOT penalized)
ai_tools_used:
  - "Claude"
  - "ChatGPT"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, EDA interpretation, and
  debugging. All engineering decisions (the work-text-vs-skills thesis, honeypot
  rule validation, stuffer definition, hybrid RRF retrieval, scoring weights)
  were reviewed and owned by the team. No candidate data was used to train or
  fine-tune any model; the ranking step makes no external API calls. Used ChatGPT for minor code refactoring and error correction. 

# Methodology summary 
methodology_summary: |
  Two-phase ranker. Offline: embed each candidate's work text (titles +
  descriptions, not the gameable skills array) with a local BGE model, build a
  feature table, and index work text with BM25. Online (the timed step): fuse
  dense cosine and BM25 rankings with Reciprocal Rank Fusion, then apply
  structured JD-rubric scoring (must-have signals found in actual work,
  experience band, geography), disqualifier penalties (keyword stuffer,
  off-domain, services-only, job-hopper), and a sentinel-aware behavioral
  multiplier (response rate, recency, notice period). Profile contradictions are
  penalized, never deleted. Keyword-stuffers are caught by the gap between
  claimed skills and actual work; honeypot rules were validated with an EDA
  harness that rejects any rule firing equally on strong and weak candidates.
  The ranking step runs CPU-only with no network in well under 5 minutes on
  precomputed artifacts.

